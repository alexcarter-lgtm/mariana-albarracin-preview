<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Proyecto — Mariana Albarracin</title>
  <meta name="description" content="Proyecto de diseño e identidad visual — Mariana Albarracin, Creative Director & Brand Identity.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,700;1,400;1,500&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
  /* ===========================
     RESET & BASE
  =========================== */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    font-family: 'Inter', sans-serif;
    color: #404041;
    background: #fff;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }
  a { color: inherit; text-decoration: none; }
  ul { list-style: none; }
  img { display: block; max-width: 100%; }

  :root {
    --text: #404041;
    --accent: #78a899;
    --gold: #fdb926;
    --border: #e8e8e5;
    --nav-h: 70px;
  }

  /* ===========================
     PAGE FADE IN
  =========================== */
  @keyframes pageFade {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .page-wrap {
    animation: pageFade 0.65s ease forwards;
  }

  /* ===========================
     NAV
  =========================== */
  .nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 900;
    height: var(--nav-h);
    padding: 0 5vw;
    display: flex;
    align-items: center;
    justify-content: space-between;
    transition: background 0.35s, box-shadow 0.35s;
  }
  .nav.scrolled {
    background: rgba(255,255,255,0.97);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    box-shadow: 0 1px 0 var(--border);
  }
  .nav-logo {
    font-family: 'Playfair Display', serif;
    font-size: 1.05rem;
    font-weight: 500;
    letter-spacing: 0.01em;
    color: var(--text);
    line-height: 1;
  }
  .nav-logo i {
    font-style: italic;
    color: var(--accent);
  }
  .nav-links {
    display: flex;
    align-items: center;
    gap: 2.75rem;
  }
  .nav-links a {
    font-size: 0.68rem;
    font-weight: 500;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--text);
    position: relative;
    padding-bottom: 2px;
    transition: color 0.2s;
  }
  .nav-links a::after {
    content: '';
    position: absolute;
    bottom: -1px; left: 0;
    width: 0; height: 1px;
    background: var(--accent);
    transition: width 0.3s;
  }
  .nav-links a:hover { color: var(--accent); }
  .nav-links a:hover::after { width: 100%; }
  .nav-cta {
    background: var(--text) !important;
    color: #fff !important;
    padding: 0.45rem 1.15rem;
    border-radius: 100px;
  }
  .nav-cta::after { display: none !important; }
  .nav-cta:hover { background: var(--accent) !important; }

  .nav-burger {
    display: none;
    flex-direction: column;
    gap: 5px;
    background: none;
    border: none;
    cursor: pointer;
    padding: 6px;
  }
  .nav-burger span {
    display: block;
    width: 22px;
    height: 1.5px;
    background: var(--text);
    transition: all 0.3s;
    transform-origin: center;
  }
  .nav-burger.open span:nth-child(1) { transform: translateY(6.5px) rotate(45deg); }
  .nav-burger.open span:nth-child(2) { opacity: 0; }
  .nav-burger.open span:nth-child(3) { transform: translateY(-6.5px) rotate(-45deg); }

  .nav-overlay {
    position: fixed;
    inset: 0;
    background: #fff;
    z-index: 800;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 2.5rem;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.35s;
  }
  .nav-overlay.open { opacity: 1; pointer-events: all; }
  .nav-overlay a {
    font-family: 'Playfair Display', serif;
    font-size: 2.2rem;
    font-weight: 400;
    color: var(--text);
    transition: color 0.2s;
  }
  .nav-overlay a:hover { color: var(--accent); }

  /* ===========================
     PROJECT HEADER
  =========================== */
  .project-header {
    padding-top: calc(var(--nav-h) + 4rem);
    padding-bottom: 3.5rem;
    padding-left: 5vw;
    padding-right: 5vw;
    max-width: 1100px;
    margin: 0 auto;
  }
  .project-label {
    display: block;
    font-size: 0.62rem;
    letter-spacing: 0.26em;
    text-transform: uppercase;
    color: var(--accent);
    font-weight: 500;
    margin-bottom: 1.25rem;
    font-variant: small-caps;
  }
  .project-title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2.8rem, 6vw, 5.5rem);
    font-weight: 400;
    line-height: 1.05;
    letter-spacing: -0.01em;
    color: var(--text);
    margin-bottom: 1.5rem;
  }
  .project-subtitle {
    font-size: 0.92rem;
    line-height: 1.75;
    color: #777;
    max-width: 56ch;
    font-weight: 300;
  }

  /* ===========================
     IMAGES
  =========================== */
  .project-images {
    max-width: 1100px;
    margin: 0 auto;
    padding: 0 5vw;
    display: flex;
    flex-direction: column;
    gap: 2rem;
  }
  .project-images img {
    width: 100%;
    height: auto;
    display: block;
  }

  /* ===========================
     WORK DONE
  =========================== */
  .project-work {
    max-width: 1100px;
    margin: 4rem auto 0;
    padding: 0 5vw;
  }
  .work-label {
    font-size: 0.6rem;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: #bbb;
    font-weight: 500;
    margin-bottom: 0.65rem;
  }
  .work-text {
    font-size: 0.82rem;
    color: #888;
    line-height: 1.7;
    font-weight: 300;
  }

  /* ===========================
     PROJECT INFO BLOCK
  =========================== */
  .project-info {
    max-width: 1100px;
    margin: 0 auto;
    padding: 3rem 5vw;
    border-top: 1px solid var(--border);
    display: flex;
    flex-wrap: wrap;
    gap: 2rem 4rem;
    margin-top: 0;
  }
  .info-item {}
  .info-key {
    font-size: 0.58rem;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: #bbb;
    font-weight: 500;
    margin-bottom: 0.35rem;
  }
  .info-val {
    font-size: 0.85rem;
    color: #888;
    font-weight: 300;
    line-height: 1.5;
  }
  .info-val a {
    color: var(--accent);
    transition: opacity 0.2s;
  }
  .info-val a:hover { opacity: 0.7; }

  /* ===========================
     BACK LINK
  =========================== */
  .back-wrap {
    max-width: 1100px;
    margin: 0 auto 5rem;
    padding: 0 5vw;
  }
  .back-link {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    font-size: 0.63rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    font-weight: 500;
    color: var(--accent);
    transition: gap 0.2s, opacity 0.2s;
  }
  .back-link:hover { gap: 0.75rem; opacity: 0.75; }

  /* ===========================
     FOOTER
  =========================== */
  footer {
    background: #2a2a2a;
    padding: 2.5rem 5vw;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 1.5rem;
  }
  .foot-brand {
    font-family: 'Playfair Display', serif;
    font-size: 1rem;
    color: #fff;
    font-weight: 400;
  }
  .foot-tag {
    font-size: 0.62rem;
    letter-spacing: 0.12em;
    color: rgba(255,255,255,0.3);
    margin-top: 0.2rem;
  }
  .foot-links {
    display: flex;
    gap: 1.5rem;
    flex-wrap: nowrap;
    align-items: center;
  }
  .foot-links a {
    color: rgba(255,255,255,0.5);
    transition: color 0.2s;
    display: flex;
    align-items: center;
  }
  .foot-links a:hover { color: #7fffd4; }
  .foot-links svg { display: block; }
  .foot-copy {
    font-size: 0.6rem;
    color: rgba(255,255,255,0.2);
  }

  /* ===========================
     NOT FOUND
  =========================== */
  .not-found {
    padding: calc(var(--nav-h) + 6rem) 5vw 8rem;
    text-align: center;
    max-width: 600px;
    margin: 0 auto;
  }
  .not-found h2 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.8rem, 4vw, 3rem);
    font-weight: 400;
    color: var(--text);
    margin-bottom: 1rem;
  }
  .not-found p {
    font-size: 0.9rem;
    color: #888;
    line-height: 1.7;
    margin-bottom: 2rem;
  }

  /* ===========================
     RESPONSIVE
  =========================== */
  @media (max-width: 1100px) {
    .nav-links { display: none; }
    .nav-burger { display: flex; }
  }
  @media (max-width: 720px) {
    :root { --nav-h: 60px; }
    .project-header { padding-top: calc(var(--nav-h) + 2.5rem); padding-bottom: 2.5rem; }
    .project-title { font-size: clamp(2.2rem, 8vw, 3.5rem); }
    .project-subtitle { font-size: 0.86rem; }
    .project-images { gap: 1rem; }
    .project-info { gap: 1.5rem 2.5rem; padding: 2rem 5vw; }
    footer { flex-direction: column; text-align: center; padding: 2rem 5vw; gap: 1rem; }
    .foot-links { justify-content: center; gap: 1.5rem; }
  }
  @media (max-width: 480px) {
    .project-title { font-size: clamp(2rem, 9vw, 3rem); }
    .nav-overlay a { font-size: 1.8rem; }
  }
  </style>
</head>
<body>

============================= -->
<nav class="nav" id="mainNav">

  <ul class="nav-links">

============================= -->
<div class="page-wrap" id="pageWrap"></div>

<!-- ============================

<footer>

    <div class="foot-brand">Mariana Albarracin</div>

  </div>
  <div>

        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M20.447 20.452H16.89v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a1.98 1.98 0 01-1.98-1.98 1.98 1.98 0 011.98-1.98 1.98 1.98 0 011.98 1.98 1.98 1.98 0 01-1.98 1.98zm1.957 13.019H3.379V9h3.915v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>

  </div>

</footer>

<script>
/* ==============================
   PROJECTS DATA
============================== */
const PROJECTS_DATA = {
  paul: {
    label: 'Branding & Comunicación Visual',
    title: 'Paul',
    subtitle: 'PAUL es mucho más que un local de decoración. Territorio dominado por los climas y las sensaciones. Industrial y urbano, rústico y campestre, un poco del pasado, un poco imaginado.',
    work: 'Diseño de Identidad Visual / Gift Card / TAG · R.O.U / Afiche Institucional / Gacetilla de Prensa / Etiquetas de tráfico / Diseño de producto / Diseño Web / Comunicación visual para Redes Sociales',
    images: ['img/paul/01.jpg','img/paul/02.jpg','img/paul/03.jpg','img/paul/04.jpg','img/paul/05.jpg','img/paul/06.jpg','img/paul/07.jpg','img/paul/08.jpg','img/paul/09.jpg','img/paul/10.jpg'],
    client: 'Paul French Gallery Buenos Aires · Paul Beach House Punta del Este',
    year: '2012 — 2018',
    web: { label: 'pauldeco.com', url: 'http://www.pauldeco.com/' },
    instagram: { label: '@paul_french_gallery', url: 'https://www.instagram.com/paul_french_gallery/' }
  },
  'le-bairen': {
    label: 'Branding / Identidad Visual · Packaging · E-commerce',
    title: 'Le Bairén',
    subtitle: 'Recetas tradicionales españolas, gourmet. Productos naturales, saludables y sabrosos.',
    work: 'Branding / Diseño de Sistema de Identidad Visual para packaging de producto / Diseño de Logotipo / Diseño web e-commerce',
    images: ['img/le-bairen/01.jpg','img/le-bairen/02.jpg','img/le-bairen/03.jpg','img/le-bairen/04.jpg','img/le-bairen/05.jpg'],
    client: 'Le Bairén · Recetas tradicionales españolas, gourmet',
    year: '2021',
    country: 'España'
  }
};

/* ==============================
   RENDER
============================== */
function getParam(key) {
  return new URLSearchParams(window.location.search).get(key);
}

function render() {
  const id = getParam('id');
  const wrap = document.getElementById('pageWrap');
  const p = id && PROJECTS_DATA[id];

  if (!p) {
    wrap.innerHTML = `
      <div class="not-found">
        <h2>Proyecto no encontrado</h2>
        <p>El proyecto que buscas no existe o no está disponible.</p>
        <a href="index.html#portfolio" class="back-link">← Volver al portfolio</a>
      </div>`;
    return;
  }

  // Update page title
  document.title = p.title + ' — Mariana Albarracin';

  // Images HTML
  const imgsHTML = p.images.map(src =>
    `<img src="${src}" alt="${p.title}" loading="lazy">`
  ).join('\n    ');

  // Info items
  const webItem = p.web
    ? `<div class="info-item"><div class="info-key">Web</div><div class="info-val"><a href="${p.web.url}" target="_blank" rel="noopener">${p.web.label}</a></div></div>`
    : '';
  const igItem = p.instagram
    ? `<div class="info-item"><div class="info-key">Instagram</div><div class="info-val"><a href="${p.instagram.url}" target="_blank" rel="noopener">${p.instagram.label}</a></div></div>`
    : '';

  wrap.innerHTML = `
    <header class="project-header">
      <span class="project-label">${p.label}</span>
      <h1 class="project-title">${p.title}</h1>
      <p class="project-subtitle">${p.subtitle}</p>
    </header>

    <div class="project-images">
      ${imgsHTML}
    </div>

    <div class="project-work">
      <div class="work-label">Trabajo realizado</div>
      <p class="work-text">${p.work}</p>
    </div>

    <div class="project-info">
      <div class="info-item">
        <div class="info-key">Cliente</div>
        <div class="info-val">${p.client}</div>
      </div>
      <div class="info-item">
        <div class="info-key">Año</div>
        <div class="info-val">${p.year}</div>
      </div>
      ${p.country ? `<div class="info-item"><div class="info-key">País</div><div class="info-val">${p.country}</div></div>` : ''}
      ${webItem}
      ${igItem}
    </div>

    <div class="back-wrap">
      <a href="index.html#portfolio" class="back-link">← Volver al portfolio</a>
    </div>
  `;
}

render();

/* ==============================
   STICKY NAV
============================== */
const nav = document.getElementById('mainNav');
window.addEventListener('scroll', () => {
  nav.classList.toggle('scrolled', window.scrollY > 50);
}, { passive: true });

// Set initial state (page may load already scrolled)
if (window.scrollY > 50) nav.classList.add('scrolled');

/* ==============================
   MOBILE MENU
============================== */
const burger = document.getElementById('burger');
const overlay = document.getElementById('overlay');

burger.addEventListener('click', () => {
  const open = overlay.classList.toggle('open');
  burger.classList.toggle('open', open);
  document.body.style.overflow = open ? 'hidden' : '';
});

document.querySelectorAll('.o-link').forEach(a => {
  a.addEventListener('click', () => {
    overlay.classList.remove('open');
    burger.classList.remove('open');
    document.body.style.overflow = '';
  });
});
</script>
